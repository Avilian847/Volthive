<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Product details — Volthive">
  <title>Product Detail — Volthive</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- NAV -->
<nav class="nav" id="mainNav">
  <div class="container">
    <div class="nav__inner">
      <a href="index.html" class="nav__logo"><div class="nav__logo-icon">⚡</div>Volt<span>hive</span></a>
      <ul class="nav__links">
        <li><a href="index.html"    class="nav__link">Home</a></li>
        <li><a href="products.html" class="nav__link active">Products</a></li>
      </ul>
      <div class="nav__actions">
        <div class="nav__search">
          <span class="nav__search-icon">🔍</span>
          <input id="navSearch" type="search" class="nav__search-input" placeholder="Search gadgets...">
        </div>
        <button id="darkToggle" class="dark-toggle">☀️</button>
        <a href="cart.html" class="nav__btn">🛒<span class="nav__badge cart-badge" style="display:none">0</span></a>
        <button id="profileBtn" class="nav__btn">👤</button>
        <button id="hamburger" class="nav__hamburger"><span></span><span></span><span></span></button>
      </div>
    </div>
  </div>
</nav>
<div id="mobileNav" class="nav__mobile">
  <a href="index.html"    class="nav__mobile-link">🏠 Home</a>
  <a href="products.html" class="nav__mobile-link">📦 Products</a>
  <a href="cart.html"     class="nav__mobile-link">🛒 Cart</a>
  <a href="login.html"    class="nav__mobile-link">👤 Account</a>
</div>

<main class="page-wrap section">
  <div class="container">

    <!-- Breadcrumb -->
    <nav aria-label="Breadcrumb" style="margin-bottom:1.5rem;font-size:0.825rem;color:var(--text-2);display:flex;align-items:center;gap:0.5rem">
      <a href="index.html" style="color:var(--text-2)">Home</a>
      <span>›</span>
      <a href="products.html" style="color:var(--text-2)">Products</a>
      <span>›</span>
      <span id="breadcrumbName" style="color:var(--text)">Loading…</span>
    </nav>

    <!-- Product Detail Grid -->
    <div class="product-detail__grid" id="productDetailContent">
      <div style="display:flex;align-items:center;justify-content:center;height:400px;color:var(--text-2)">
        Loading product…
      </div>
    </div>

    <!-- Tabs: Description | Specs | Reviews -->
    <div style="margin-top:4rem">
      <!-- Tab Nav -->
      <div style="display:flex;gap:0.25rem;border-bottom:1px solid var(--border);margin-bottom:1.5rem" role="tablist">
        <button class="tab-btn active" data-tab="desc" role="tab">Overview</button>
        <button class="tab-btn" data-tab="specs" role="tab">Specs</button>
        <button class="tab-btn" data-tab="reviews" role="tab">Reviews</button>
      </div>

      <!-- Tab Panels -->
      <div id="tab-desc" class="tab-panel">
        <p id="descText" style="color:var(--text-2);line-height:1.8;max-width:700px"></p>
      </div>
      <div id="tab-specs" class="tab-panel hidden">
        <div class="product-detail__specs" id="specsTable" style="max-width:600px"></div>
      </div>
      <div id="tab-reviews" class="tab-panel hidden">
        <div id="reviewsList"></div>
      </div>
    </div>

    <!-- Related Products -->
    <div style="margin-top:4rem">
      <div class="section-header">
        <div class="section-header__eyebrow">More Like This</div>
        <h2 class="section-header__title">Related <em>Products</em></h2>
      </div>
      <div class="product-grid" id="relatedGrid"></div>
    </div>

  </div>
</main>

<!-- FOOTER -->
<footer class="footer">
  <div class="container">
    <div class="footer__grid">
      <div>
        <div class="footer__brand-name">Volt<span>hive</span></div>
        <p class="footer__tagline">Premium electronics & gadgets store.</p>
      </div>
      <div>
        <div class="footer__col-title">Shop</div>
        <ul class="footer__links">
          <li><a href="products.html" class="footer__link">All Products</a></li>
        </ul>
      </div>
      <div>
        <div class="footer__col-title">Account</div>
        <ul class="footer__links">
          <li><a href="login.html" class="footer__link">Login</a></li>
        </ul>
      </div>
      <div>
        <div class="footer__col-title">Support</div>
        <ul class="footer__links">
          <li><a href="#" class="footer__link">Help Centre</a></li>
        </ul>
      </div>
    </div>
    <div class="footer__bottom"><span>© 2024 Volthive.</span></div>
  </div>
</footer>

<style>
  .tab-btn {
    padding: 0.65rem 1.25rem;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    color: var(--text-2);
    font-family: var(--font-display);
    font-size: 0.875rem;
    font-weight: 600;
    cursor: pointer;
    transition: color 0.2s, border-color 0.2s;
  }
  .tab-btn:hover { color: var(--text); }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

  .review-card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1.25rem;
    margin-bottom: 0.75rem;
  }
  .review-author { font-family: var(--font-display); font-weight: 700; font-size: 0.9rem; }
</style>

<script src="js/products.js"></script>
<script src="js/main.js"></script>
<script>
  // ── Load product from URL param ───────────────────────────
  const params = new URLSearchParams(window.location.search);
  const productId = parseInt(params.get('id') || '1');
  const product   = getProductById(productId);

  if (!product) {
    document.getElementById('productDetailContent').innerHTML = `
      <div style="text-align:center;padding:4rem;color:var(--text-2)">
        <div style="font-size:3rem">😔</div>
        <h2 style="font-family:var(--font-display);margin:1rem 0">Product Not Found</h2>
        <a href="products.html" class="btn btn-primary">Browse Products</a>
      </div>`;
  } else {
    // Update page meta
    document.title = `${product.name} — Volthive`;
    document.getElementById('breadcrumbName').textContent = product.name;
    addRecentlyViewed(product.id);

    // Render main detail
    const isWish = isWishlisted(product.id);
    const badge  = product.badge ? `<span class="badge badge-${product.badgeType}">${product.badge}</span>` : '';
    const discount = product.oldPrice
      ? Math.round((1 - product.price / product.oldPrice) * 100)
      : null;

    document.getElementById('productDetailContent').innerHTML = `
      <!-- Gallery -->
      <div class="product-detail__gallery">
        <div class="gallery__main">
          <img src="${product.images[0]}" alt="${product.name}" id="mainImage">
        </div>
        <div class="gallery__thumbs">
          ${product.images.map((img, i) => `
            <div class="gallery__thumb ${i === 0 ? 'active' : ''}" data-img="${img}" data-idx="${i}">
              <img src="${img}" alt="${product.name} view ${i+1}">
            </div>
          `).join('')}
        </div>
      </div>

      <!-- Info -->
      <div class="product-detail__info">
        <div style="display:flex;align-items:center;gap:0.75rem;flex-wrap:wrap">
          <span class="product-detail__category">${product.category}</span>
          ${badge}
          ${product.stock <= 5 ? `<span class="badge badge-danger">Only ${product.stock} left!</span>` : ''}
        </div>

        <h1 class="product-detail__title">${product.name}</h1>

        <!-- Rating -->
        <div style="display:flex;align-items:center;gap:0.75rem">
          <span style="color:var(--warning);font-size:1.1rem">${renderStars(product.rating)}</span>
          <span style="font-family:var(--font-display);font-weight:700">${product.rating}</span>
          <span style="color:var(--text-2);font-size:0.875rem">(${product.reviews.toLocaleString()} reviews)</span>
        </div>

        <!-- Price -->
        <div class="product-detail__price-block">
          <span class="product-detail__price">${formatPrice(product.price)}</span>
          ${product.oldPrice ? `
            <span class="product-detail__price-old">${formatPrice(product.oldPrice)}</span>
            <span class="product-detail__discount">-${discount}%</span>
          ` : ''}
        </div>

        <!-- Description -->
        <p class="product-detail__desc">${product.desc}</p>

        <!-- Quantity + Add to cart -->
        <div style="display:flex;align-items:center;gap:1rem;flex-wrap:wrap">
          <div class="quantity-control">
            <button class="qty-btn qty-dec" aria-label="Decrease">−</button>
            <input class="qty-input" type="number" value="1" min="1" max="${product.stock}" id="detailQty" aria-label="Quantity">
            <button class="qty-btn qty-inc" aria-label="Increase">+</button>
          </div>
          <button class="btn btn-primary btn-lg" id="detailAddCart" style="flex:1;min-width:160px">
            🛒 Add to Cart
          </button>
          <button class="btn btn-secondary" id="detailWishlist" title="Wishlist" style="width:48px;height:48px;padding:0;font-size:1.2rem">
            ${isWish ? '❤️' : '🤍'}
          </button>
        </div>

        <!-- Quick spec preview -->
        <div class="product-detail__specs" id="quickSpecs"></div>

        <!-- Shipping note -->
        <div style="display:flex;align-items:center;gap:0.5rem;color:var(--text-2);font-size:0.825rem;padding:0.75rem 1rem;background:var(--bg-3);border-radius:var(--radius-sm);border:1px solid var(--border)">
          <span>🚚</span>
          <span>Free shipping on orders over $75. Estimated delivery: 3–5 business days.</span>
        </div>
      </div>
    `;

    // ── Gallery thumb switching ───────────────────────────
    document.querySelectorAll('.gallery__thumb').forEach(thumb => {
      thumb.addEventListener('click', () => {
        document.getElementById('mainImage').src = thumb.dataset.img;
        document.querySelectorAll('.gallery__thumb').forEach(t => t.classList.remove('active'));
        thumb.classList.add('active');
      });
    });

    // ── Quantity stepper ──────────────────────────────────
    document.querySelector('.qty-dec').addEventListener('click', () => {
      const input = document.getElementById('detailQty');
      if (parseInt(input.value) > 1) input.value = parseInt(input.value) - 1;
    });
    document.querySelector('.qty-inc').addEventListener('click', () => {
      const input = document.getElementById('detailQty');
      if (parseInt(input.value) < product.stock) input.value = parseInt(input.value) + 1;
    });

    // ── Add to cart ───────────────────────────────────────
    document.getElementById('detailAddCart').addEventListener('click', () => {
      const qty = parseInt(document.getElementById('detailQty').value);
      addToCart({ ...product, qty });
      const btn = document.getElementById('detailAddCart');
      btn.textContent = '✓ Added to Cart!';
      btn.style.background = 'var(--success)';
      setTimeout(() => { btn.textContent = '🛒 Add to Cart'; btn.style.background = ''; }, 2000);
    });

    // ── Wishlist ──────────────────────────────────────────
    document.getElementById('detailWishlist').addEventListener('click', function() {
      const now = toggleWishlist(product.id);
      this.textContent = now ? '❤️' : '🤍';
    });

    // ── Quick specs ───────────────────────────────────────
    const specEntries = Object.entries(product.specs).slice(0, 4);
    document.getElementById('quickSpecs').innerHTML = specEntries.map(([k, v]) => `
      <div class="spec-row">
        <span class="spec-row__key">${k}</span>
        <span class="spec-row__val">${v}</span>
      </div>
    `).join('');

    // ── Full specs tab ────────────────────────────────────
    document.getElementById('specsTable').innerHTML = Object.entries(product.specs).map(([k, v]) => `
      <div class="spec-row">
        <span class="spec-row__key">${k}</span>
        <span class="spec-row__val">${v}</span>
      </div>
    `).join('');

    // ── Description tab ───────────────────────────────────
    document.getElementById('descText').textContent = product.desc;

    // ── Reviews tab ───────────────────────────────────────
    const mockReviews = [
      { name: 'Alex M.', rating: 5, date: 'Nov 2024', text: 'Absolutely love this product! The quality is outstanding and it arrived in perfect condition. Would definitely recommend.' },
      { name: 'Sarah K.', rating: 5, date: 'Oct 2024', text: 'Exceeded my expectations. Great build quality, fast delivery, and the performance is top notch.' },
      { name: 'James R.', rating: 4, date: 'Oct 2024', text: 'Really good product overall. A few minor quirks but nothing that impacts the experience significantly.' },
    ];
    document.getElementById('reviewsList').innerHTML = mockReviews.map(r => `
      <div class="review-card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem">
          <span class="review-author">${r.name}</span>
          <span style="color:var(--text-3);font-size:0.78rem">${r.date}</span>
        </div>
        <div style="color:var(--warning);margin-bottom:0.5rem">${'★'.repeat(r.rating)}${'☆'.repeat(5-r.rating)}</div>
        <p style="color:var(--text-2);font-size:0.875rem">${r.text}</p>
      </div>
    `).join('');

    // ── Related products ──────────────────────────────────
    const related = PRODUCTS
      .filter(p => p.category === product.category && p.id !== product.id)
      .slice(0, 4);
    renderProductGrid('relatedGrid', related.length ? related : PRODUCTS.filter(p => p.id !== product.id).slice(0, 4));
  }

  // ── Tab switching ─────────────────────────────────────────
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
      btn.classList.add('active');
      document.getElementById(`tab-${btn.dataset.tab}`).classList.remove('hidden');
    });
  });
</script>
</body>
</html>
